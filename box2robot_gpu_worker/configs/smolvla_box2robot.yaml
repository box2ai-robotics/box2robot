# SmolVLA config for Box2Robot 6-DOF arm (vision-language-action)
# Requires camera images in training data. These are recommended defaults.

policy:
  type: smolvla
  chunk_size: 50              # 50 actions per prediction (2.5s at 20Hz)
  n_action_steps: 50
  n_obs_steps: 1

  # VLM backbone
  vlm_model_name: "HuggingFaceTB/SmolVLM2-500M-Video-Instruct"
  num_vlm_layers: 16
  resize_imgs_with_padding: [512, 512]

  # Expert architecture
  expert_width_multiplier: 0.75
  self_attn_every_n_layers: 2
  num_steps: 10               # Decoding steps
  use_cache: true

  # Finetuning strategy (freeze VLM, train expert only)
  freeze_vision_encoder: true
  train_expert_only: true
  train_state_proj: true

training:
  steps: 30000                # VLA needs more steps
  batch_size: 16              # Large model, smaller batch
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10
  grad_clip_norm: 10.0
  scheduler_warmup_steps: 1000
  scheduler_decay_steps: 30000
  scheduler_decay_lr: 2.5e-6

dataset:
  fps: 20
  servo_count: 6
  pos_max: 4095

# GPU recommendations (vision model, needs more VRAM):
#   RTX 3090 (24GB): batch_size 8,  ~6h / 30000 steps
#   RTX 4090 (24GB): batch_size 16, ~3h / 30000 steps
#   A100   (80GB):   batch_size 64, ~1h / 30000 steps
# Note: Requires camera images in dataset (aligned_frames with images)
